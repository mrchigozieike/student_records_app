{% extends "base.html" %}

{% block content %}
<h2>Edit Student</h2>

<form method="POST">
    <div class="form-group">
        <label>Name:</label>
        <input type="text" name="name" value="{{ student.name }}" required>
    </div>
    
    <div class="form-group">
        <label>Major:</label>
        <input type="text" name="major" value="{{ student.major or '' }}">
    </div>
    
    <div class="form-group">
        <label>Enrollment Date:</label>
        <input type="date" name="enrollment_date" value="{{ student.enrollment_date }}" required>
    </div>
    
    <div class="form-group">
        <label>Birth Date:</label>
        <input type="date" name="birth_date" value="{{ student.birth_date }}" required>
    </div>
    
    <button type="submit" class="btn">Update Student</button>
    <a href="/students" class="btn" style="background: #666;">Cancel</a>
</form>
{% endblock %}
